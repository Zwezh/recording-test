<div class="modal-backdrop" role="presentation">
  <section
    class="confirm-modal"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="confirm-title"
    aria-describedby="confirm-copy"
  >
    <button type="button" class="modal-close" [attr.aria-label]="cancelLabel()" (click)="cancelled.emit()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6L6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z"
        />
      </svg>
    </button>
    <div class="warning-icon" aria-hidden="true">!</div>
    <h2 id="confirm-title">{{ title() }}</h2>
    <p id="confirm-copy">{{ description() }}</p>
    <div class="confirm-actions">
      <button type="button" class="secondary-action" (click)="cancelled.emit()">{{ cancelLabel() }}</button>
      <button type="button" class="danger-action" (click)="confirmed.emit()">{{ confirmLabel() }}</button>
    </div>
  </section>
</div>
