<aside class="saved-panel" aria-label="Saved recordings">
  <div class="panel-meta">
    <span>{{ bandwidthLabel() }}</span>
    <span>{{ qualityLabel() }}</span>
    @if (manualOverride()) {
      <span>Manual</span>
    }
  </div>

  @if (videos().length === 0) {
    <div class="empty-state">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M4 7.5A2.5 2.5 0 0 1 6.5 5h7A2.5 2.5 0 0 1 16 7.5v1.2l3.3-2.1c.7-.4 1.7.1 1.7 1v8.8c0 .9-1 1.4-1.7 1L16 15.3v1.2a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 4 16.5v-9Z"
        />
      </svg>
      <p>There are no recorded videos yet</p>
    </div>
  } @else {
    <ul class="saved-list">
      @for (video of videos(); track video.id) {
        <li>
          <button type="button" class="video-card" (click)="videoPlayed.emit(video)">
            <video [src]="video.url" muted preload="metadata" aria-hidden="true"></video>
            <span class="video-gradient" aria-hidden="true"></span>
            <span class="video-meta">
              <span>{{ formatDate(video.createdAt) }}</span>
              <span>{{ formatTime(video.createdAt) }}</span>
              <span>{{ formatDuration(video.durationSeconds) }}</span>
            </span>
            <span class="sr-only">
              Play recording from {{ formatDate(video.createdAt) }} at {{ formatTime(video.createdAt) }}
            </span>
          </button>
          <button
            type="button"
            class="delete-button"
            aria-label="Delete recording"
            title="Delete recording"
            (click)="deleteRequested.emit({ video, event: $event })"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M8 4h8l1 2h4v2h-2l-1 12H6L5 8H3V6h4l1-2Zm0 4 .8 10h6.4L16 8H8Zm2 2h2v6h-2v-6Zm4 0h2v6h-2v-6Z"
              />
            </svg>
          </button>
        </li>
      }
    </ul>
  }
</aside>
