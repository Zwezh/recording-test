<div class="modal-backdrop" role="presentation">
  <section class="player-modal" role="dialog" aria-modal="true" aria-label="Play recorded video">
    <button type="button" class="modal-close" aria-label="Close video player" (click)="closed.emit()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6L6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z"
        />
      </svg>
    </button>
    <video [src]="video().url" controls autoplay></video>
  </section>
</div>
